# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties: {}
  commandFunction: |-
    (config) => {
      return {
        command: 'node',
        args: ['/app/dist/index.js'],
        env: {}
      };
    }

description: "AI-powered weld analysis for any MCP-compatible AI assistant. Analyze weld photos, look up defect types, get technique tips, and understand quality scoring."

categories:
  - Industrial
  - Education
  - Manufacturing

tags:
  - welding
  - weld analysis
  - quality control
  - manufacturing
  - education
  - AI
  - image analysis
  - AWS standards

features:
  - Weld photo analysis with quality scoring (0-100)
  - Defect detection and classification
  - Technique improvement recommendations
  - Educational content for welding students
  - AWS/ASME standard alignment
